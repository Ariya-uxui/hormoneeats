<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#F0EDE6" />
    <meta name="description" content="HormoneEats — กินตามฮอร์โมน ลดน้ำหนักยั่งยืน สุขภาพดีจากข้างใน" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HormoneEats" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/icon-192.png">

    <!-- Open Graph -->
    <meta property="og:title" content="HormoneEats 🌿" />
    <meta property="og:description" content="กินตามฮอร์โมน ลดน้ำหนักยั่งยืน" />
    <meta property="og:type" content="website" />

    <title>HormoneEats 🌿</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        height: 100%; margin: 0; padding: 0;
        overflow: hidden; background: #E8E4DC;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        height: 100%; display: flex;
        align-items: center; justify-content: center;
      }
      #root:empty::after {
        content: "🌿"; font-size: 48px;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .5; transform: scale(.9); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('SW registered'))
            .catch(e => console.log('SW error:', e))
        })
      }
    </script>
  </body>
</html>
